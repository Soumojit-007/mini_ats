name: Node.js CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Create .env file (🔥 FIX)
      - name: Create .env file
        run: |
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" > .env
          echo "PORT=5000" >> .env

      # 5. Build step (optional placeholder)
      - name: Build
        run: echo "Build successful"

      # 6. Run server + health check
      - name: Run server and test
        run: |
          node src/server.js &
          sleep 5
          curl -f http://localhost:5000 || exit 1

      # 7. Success message
      - name: CI Passed
        run: echo "CI pipeline executed successfully ✅"